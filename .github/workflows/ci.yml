name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1
        with:
          cache: true
      
      - name: Run test
        run: vp test
