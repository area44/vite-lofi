name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      
      - name: Run test
        run: vp test
